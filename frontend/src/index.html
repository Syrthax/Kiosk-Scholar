<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiosk-Scholar</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <header class="app-header">
      <span class="app-title">📚 Kiosk-Scholar</span>
      <div class="header-right">
        <div id="ollama-status" class="backend-status">Ollama: checking…</div>
        <div id="backend-status" class="backend-status">Checking backend…</div>
      </div>
    </header>

    <div class="app-layout">
      <!-- Left: PDF upload + viewer -->
      <section class="panel-left">
        <div id="upload-area" class="upload-area">
          <input type="file" id="pdf-input" accept=".pdf" hidden />
          <button id="upload-btn" class="upload-btn">📄 Choose PDF</button>
          <p class="upload-hint">or drag &amp; drop a PDF here</p>
        </div>

        <div id="pdf-info" class="pdf-info hidden">
          <span id="pdf-name"></span>
          <span id="pdf-pages"></span>
          <button id="summarize-btn" class="action-btn" disabled>🤖 Summarize</button>
        </div>

        <div id="pdf-viewer" class="pdf-viewer">
          <p class="viewer-placeholder">PDF preview will appear here after upload</p>
        </div>
      </section>

      <!-- Middle: AI Summary panel -->
      <aside class="panel-middle">
        <div class="sidebar-title">AI Summary</div>
        <div id="summary-panel" class="summary-panel">
          <p class="sidebar-placeholder">Upload a PDF and click <strong>🤖 Summarize</strong> to generate an AI summary.</p>
        </div>
      </aside>

      <!-- Right: extracted text / explain sidebar -->
      <aside class="panel-right">
        <div class="sidebar-tabs">
          <button class="tab-btn active" data-tab="text-tab">Extracted Text</button>
          <button class="tab-btn" data-tab="explain-tab">Explain</button>
        </div>

        <div id="text-tab" class="tab-content active">
          <div id="text-sidebar" class="text-sidebar">
            <p class="sidebar-placeholder">Upload a PDF to see its extracted text.</p>
          </div>
        </div>

        <div id="explain-tab" class="tab-content">
          <div class="explain-input-area">
            <textarea id="explain-input" class="explain-textarea" placeholder="Paste or type text to explain…" rows="4"></textarea>
            <button id="explain-btn" class="action-btn">💡 Explain</button>
          </div>
          <div id="explain-output" class="explain-output">
            <p class="sidebar-placeholder">Select text and click Explain to get an AI explanation.</p>
          </div>
        </div>
      </aside>
    </div>
  </body>
</html>
